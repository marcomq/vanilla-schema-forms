<!DOCTYPE html>
<html lang="en" class="wa-theme-default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla Schema Forms - Web Awesome Example</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist-cdn/styles/webawesome.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.2.1/dist-cdn/webawesome.loader.js"></script>
  <style>
    :root {
      --example-surface: color-mix(in srgb, var(--wa-color-neutral-fill-normal) 76%, white);
      --example-border: var(--wa-color-neutral-border-normal);
      --example-shadow: 0 18px 45px color-mix(in srgb, var(--wa-color-brand-fill-loud) 12%, transparent);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--wa-color-brand-fill-loud) 18%, transparent), transparent 32%),
        linear-gradient(180deg, color-mix(in srgb, var(--wa-color-neutral-fill-normal) 94%, white), white 45%);
      color: var(--wa-color-text-normal);
    }

    .example-shell {
      width: min(1200px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    .example-header {
      display: grid;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .example-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: minmax(0, 1.7fr) minmax(300px, 1fr);
      align-items: start;
    }

    .example-panel {
      padding: 1.25rem;
      border: 1px solid var(--example-border);
      border-radius: var(--wa-border-radius-l);
      background: color-mix(in srgb, white 90%, var(--wa-color-neutral-fill-normal));
      box-shadow: var(--example-shadow);
    }

    #form-container form {
      display: grid;
      gap: 1rem;
    }

    .vsf-wa-field,
    .vsf-wa-layout-group,
    .vsf-wa-checkbox-field,
    .vsf-wa-additional-property-row,
    .vsf-wa-array-item-row,
    .vsf-wa-fieldset,
    .vsf-wa-object {
      margin: 0;
    }

    .vsf-wa-field,
    .vsf-wa-additional-property-row,
    .vsf-wa-array-item-row {
      display: grid;
      gap: 0.5rem;
      padding: 1rem;
      border: 1px solid color-mix(in srgb, var(--example-border) 82%, white);
      border-radius: var(--wa-border-radius-m);
      background: var(--example-surface);
    }

    .vsf-wa-control-wrap,
    .vsf-wa-additional-properties-items,
    .vsf-wa-array-items,
    .vsf-wa-layout-group-content,
    .vsf-wa-oneof-container,
    .vsf-wa-section {
      display: grid;
      gap: 0.75rem;
    }

    .vsf-wa-compact-row {
      display: grid;
      grid-template-columns: minmax(120px, 180px) minmax(0, 1fr);
      gap: 0.35rem 1rem;
      align-items: start;
    }

    .vsf-wa-label,
    .vsf-wa-legend,
    .vsf-wa-layout-group-label {
      font-size: var(--wa-font-size-s);
      font-weight: var(--wa-font-weight-action);
      letter-spacing: 0.01em;
    }

    .vsf-wa-compact-label {
      padding-top: 0.55rem;
      font-size: var(--wa-font-size-s);
      font-weight: var(--wa-font-weight-action);
      letter-spacing: 0.01em;
    }

    .vsf-wa-compact-content {
      display: grid;
      gap: 0.35rem;
      min-width: 0;
    }

    .vsf-wa-label-small,
    .vsf-wa-description,
    .vsf-wa-compact-description {
      font-size: var(--wa-font-size-xs);
    }

    .vsf-wa-description,
    .vsf-wa-muted {
      color: var(--wa-color-text-quiet);
    }

    .vsf-wa-fieldset,
    .vsf-wa-object {
      display: grid;
      gap: 0.9rem;
      padding: 1rem;
      border: 1px solid var(--example-border);
      border-radius: var(--wa-border-radius-l);
      background: white;
    }

    .vsf-wa-array-item-row,
    .vsf-wa-additional-property-row {
      align-items: start;
    }

    .vsf-wa-array-item-row > button,
    .vsf-wa-additional-property-row > button {
      justify-self: start;
    }

    .vsf-wa-compact-error {
      grid-column: 2;
    }

    .vsf-wa-ap-key-container,
    .vsf-wa-additional-property-header {
      display: grid;
      gap: 0.35rem;
    }

    .vsf-wa-required {
      color: var(--wa-color-danger-fill-loud);
      margin-left: 0.25rem;
    }

    .vsf-wa-link-button {
      justify-self: start;
      padding-inline: 0;
    }

    .vsf-wa-error {
      color: var(--wa-color-danger-on-quiet);
      font-size: var(--wa-font-size-xs);
    }

    .vsf-wa-alert {
      padding: 0.9rem 1rem;
      border-radius: var(--wa-border-radius-m);
      border: 1px solid var(--wa-color-danger-border-normal);
    }

    .vsf-wa-alert-danger {
      background: color-mix(in srgb, var(--wa-color-danger-fill-quiet) 36%, white);
    }

    .example-output {
      margin: 0;
      padding: 1rem;
      min-height: 360px;
      overflow: auto;
      border-radius: var(--wa-border-radius-m);
      background: #111827;
      color: #c6f6d5;
      font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    @media (max-width: 900px) {
      .example-grid {
        grid-template-columns: 1fr;
      }

      .vsf-wa-compact-row {
        grid-template-columns: 1fr;
      }

      .vsf-wa-compact-label,
      .vsf-wa-compact-error {
        grid-column: auto;
      }

      .vsf-wa-compact-label {
        padding-top: 0;
      }
    }
  </style>
</head>
<body>
  <main class="example-shell">
    <header class="example-header">
      <wa-tag variant="brand" appearance="filled">Web Awesome Example</wa-tag>
      <h1 style="margin: 0;">Vanilla Schema Forms with a Web Awesome skin</h1>
      <p style="margin: 0; max-width: 70ch; color: var(--wa-color-text-quiet);">
        This example keeps the core vanilla renderer and layers a reusable Web Awesome theme helper plus custom renderers for advanced sections, optional TLS settings, and typed arrays.
      </p>
    </header>

    <section class="example-grid">
      <div class="example-panel">
        <div id="form-container"></div>
      </div>

      <aside class="example-panel">
        <h2 style="margin-top: 0;">Live JSON</h2>
        <pre id="output" class="example-output">{}</pre>
      </aside>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
